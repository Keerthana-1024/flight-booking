# ─── Server ───────────────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=flights

# ─── Supabase / PostgreSQL ─────────────────────────────────────────────────
spring.datasource.url=${SUPABASE_CONNECTION_STRING:jdbc:postgresql://localhost:5432/flights}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Upstash Redis ─────────────────────────────────────────────────────────
spring.data.redis.url=${UPSTASH_REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=5000

# ─── Stripe ────────────────────────────────────────────────────────────────
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_REPLACE_ME}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_REPLACE_ME}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_REPLACE_ME}

# ─── Amadeus ───────────────────────────────────────────────────────────────
amadeus.api.key=${AMADEUS_API_KEY:}
amadeus.api.secret=${AMADEUS_API_SECRET:}

# ─── JWT ───────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:fallback_dev_secret_min_32_characters_here}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Static Resources (serve index.html for all routes) ───────────────────
spring.web.resources.static-locations=classpath:/static/

# ─── Logging ───────────────────────────────────────────────────────────────
logging.level.com.flights=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
